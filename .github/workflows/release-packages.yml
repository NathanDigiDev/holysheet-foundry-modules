name: Package Foundry releases

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build package zips
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Foundry package archives
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          packages=(
            "holysheet-custom-calendar:holysheet-custom-calendar.zip:holysheet-custom-calendar-module.json"
            "holysheet-foundry-friendly-interface:holysheet-foundry-friendly-interface.zip:holysheet-foundry-friendly-interface-module.json"
            "holysheet-FVTT-System:holysheet.zip:holysheet-system.json"
            "holysheet-gm-stories:holysheet-gm-stories.zip:holysheet-gm-stories-module.json"
            "holysheet-immersive-books:holysheet-immersive-books.zip:holysheet-immersive-books-module.json"
            "holysheet-interactive-zones:holysheet-interactive-zones.zip:holysheet-interactive-zones-module.json"
            "holysheet-item-storage:holysheet-item-storage.zip:holysheet-item-storage-module.json"
            "holysheet-lockpicking:holysheet-lockpicking.zip:holysheet-lockpicking-module.json"
            "holysheet-quest-system:holysheet-quest-system.zip:holysheet-quest-system-module.json"
          )

          # Fichiers de dev a exclure des zips publics (specs internes, tests, tooling)
          dev_files=(
            "PROMPT_MASTER.md"
            "MACROS.txt"
            "package.json"
            "package-lock.json"
            "tests"
            ".gitignore"
            ".DS_Store"
          )

          staging_root="$RUNNER_TEMP/staging"

          for package in "${packages[@]}"; do
            IFS=":" read -r source_dir archive_name manifest_asset <<< "$package"

            if [[ ! -d "$source_dir" ]]; then
              echo "Missing package directory: $source_dir" >&2
              exit 1
            fi

            if [[ -f "$source_dir/module.json" ]]; then
              manifest_file="module.json"
            elif [[ -f "$source_dir/system.json" ]]; then
              manifest_file="system.json"
            else
              echo "Package directory has no module.json or system.json: $source_dir" >&2
              exit 1
            fi

            # Copie de travail : on ne modifie jamais les sources du depot
            staging_dir="$staging_root/$source_dir"
            rm -rf "$staging_dir"
            mkdir -p "$staging_dir"
            cp -R "$source_dir/." "$staging_dir/"

            for dev_file in "${dev_files[@]}"; do
              rm -rf "$staging_dir/$dev_file"
            done

            # Le champ "download" du manifest publie doit pointer vers le zip de
            # CETTE version (regle Foundry) : "manifest" reste sur latest, mais
            # chaque version enregistree sur foundryvtt.com doit rester
            # installable avec son propre zip.
            if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
              versioned_download="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${archive_name}"
              jq --arg url "$versioned_download" '.download = $url' \
                "$staging_dir/$manifest_file" > "$staging_dir/$manifest_file.tmp"
              mv "$staging_dir/$manifest_file.tmp" "$staging_dir/$manifest_file"
            fi

            echo "Building dist/$archive_name from $staging_dir"
            (
              cd "$staging_dir"
              zip -r "$GITHUB_WORKSPACE/dist/$archive_name" .
            )

            echo "Copying $staging_dir/$manifest_file to dist/$manifest_asset"
            cp "$staging_dir/$manifest_file" "dist/$manifest_asset"
          done

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-packages
          path: dist/*

      - name: Upload package assets to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
